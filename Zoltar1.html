<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoltar & Friends | AI Fortune Teller Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            background-color: var(--dark-bg);
            color: #e5e7eb;
            font-family: 'Noto Serif TC', serif;
            overflow: hidden;
            height: 100vh;
            height: -webkit-fill-available;
        }
        .special-font { font-family: 'Orbitron', sans-serif; }
        
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .zoltar-cabinet {
            border: 8px double var(--gold);
            position: relative;
        }
        .zoltar-cabinet::before {
            content: "";
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 20px solid var(--gold);
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.5); }
        }
        .pulse-active { animation: pulse-gold 3s infinite; }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(212, 175, 55, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        @keyframes card-out {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .print-animation { animation: card-out 2s ease-out forwards; }

        .oracle-img-container {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center 20%;
            border-radius: 8px;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: filter 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
        }
        .oracle-img-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 1;
        }

        .mic-wave {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            height: 12px;
        }
        .mic-wave span {
            width: 2px;
            height: 100%;
            background: #d4af37;
            animation: wave 1s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { height: 40%; }
            50% { height: 100%; }
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            gap: 8px;
        }

        .oracle-card-disabled {
            cursor: not-allowed !important;
            filter: grayscale(1);
            opacity: 0.5;
        }

        .stage-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4">

    <div id="main-frame" class="w-full max-w-2xl h-full max-h-[850px] zoltar-cabinet glass-panel rounded-t-3xl overflow-hidden flex flex-col items-center p-1 transition-all duration-700">
        <div class="scanline"></div>
        
        <div class="w-full text-center py-4 border-b border-yellow-900/30">
            <h1 class="special-font text-xl tracking-[0.5em] text-yellow-500">ZOLTAR & FRIENDS</h1>
        </div>

        <div class="flex-1 w-full flex flex-col items-center p-4 relative overflow-hidden">
            
            <!-- Step 1: Initial -->
            <div id="step-1" class="text-center flex flex-col items-center justify-center h-full">
                <div class="relative mb-12">
                    <div class="w-40 h-40 rounded-full border-2 border-yellow-900/50 flex items-center justify-center pulse-active">
                        <span class="text-6xl">👁️</span>
                    </div>
                </div>
                <h2 class="text-lg mb-4 text-yellow-200">偵測到生命脈動...</h2>
                <button onclick="nextStep(2)" class="px-10 py-4 border border-yellow-600 text-yellow-500 hover:bg-yellow-600 hover:text-black transition-all font-bold tracking-widest">
                    觸碰螢幕開啟連結
                </button>
            </div>

            <!-- Step 2: Select Oracle -->
            <div id="step-2" class="hidden stage-container fade-in">
                <div class="bg-black/40 p-4 rounded-lg mb-4 border border-yellow-900/20">
                    <p id="hook-text" class="text-sm italic leading-relaxed text-yellow-100"></p>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button id="btn-zoltar" onclick="selectOracle('Zoltar')" disabled class="p-3 glass-panel text-left border border-orange-900/40 group transition-all flex flex-col relative overflow-hidden oracle-card-disabled">
                        <div id="loading-zoltar" class="loading-overlay"><span class="animate-pulse text-orange-400 text-[10px] tracking-widest">暖機中...</span></div>
                        <div id="img-zoltar" class="oracle-img-container border-orange-900/40 text-4xl">🔮</div>
                        <h3 class="font-bold text-xs group-hover:text-orange-400">Zoltar Original🔮</h3>
                    </button>
                    <button id="btn-priest" onclick="selectOracle('祭司')" disabled class="p-3 glass-panel text-left border border-yellow-900/40 group transition-all flex flex-col relative overflow-hidden oracle-card-disabled">
                        <div id="loading-priest" class="loading-overlay"><span class="animate-pulse text-yellow-400 text-[10px] tracking-widest">呼喚中...</span></div>
                        <div id="img-priest" class="oracle-img-container text-4xl">🔱</div>
                        <h3 class="font-bold text-xs group-hover:text-yellow-400">蘇美爾祭司🔱</h3>
                    </button>
                    <button id="btn-li" onclick="selectOracle('李淳風')" disabled class="p-3 glass-panel text-left border border-red-900/40 group transition-all flex flex-col relative overflow-hidden oracle-card-disabled">
                        <div id="loading-li" class="loading-overlay"><span class="animate-pulse text-red-400 text-[10px] tracking-widest">推背中...</span></div>
                        <div id="img-li" class="oracle-img-container border-red-900/40 text-4xl">☯️</div>
                        <h3 class="font-bold text-xs group-hover:text-red-400">李淳風☯️</h3>
                    </button>
                    <button id="btn-oracle" onclick="selectOracle('先知')" disabled class="p-3 glass-panel text-left border border-blue-900/40 group transition-all flex flex-col relative overflow-hidden oracle-card-disabled">
                        <div id="loading-oracle" class="loading-overlay"><span class="animate-pulse text-blue-400 text-[10px] tracking-widest">同步中...</span></div>
                        <div id="img-oracle" class="oracle-img-container border-blue-900/40 text-4xl">📡</div>
                        <h3 class="font-bold text-xs group-hover:text-blue-300">未來先知📡</h3>
                    </button>
                </div>
                <div class="text-center">
                    <p id="load-status" class="text-[9px] text-yellow-700 uppercase tracking-widest">正在聯繫星際導師...</p>
                </div>
            </div>

            <!-- Step 3: Payment -->
            <div id="step-3" class="hidden text-center flex flex-col items-center justify-center h-full fade-in">
                <h2 class="text-2xl mb-2 font-bold text-yellow-500">解鎖時空連結</h2>
                <div class="bg-white p-4 rounded-xl my-6">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=ZoltarPayment" alt="QR Code" class="w-32 h-32 mb-4">
                    <button onclick="nextStep(4)" class="w-full px-8 py-3 bg-black text-yellow-500 border border-yellow-500 rounded-full text-sm font-bold">模擬支付成功</button>
                </div>
            </div>

            <!-- Step 4: Scenario Selection & Interaction -->
            <div id="step-4" class="hidden stage-container fade-in">
                <div class="flex items-center gap-4 mb-4 shrink-0">
                    <div class="w-14 h-14 rounded-full border-2 border-yellow-500 flex items-center justify-center overflow-hidden bg-black">
                        <img id="oracle-avatar-img" src="" alt="Oracle" class="w-full h-full object-cover hidden">
                        <span id="oracle-avatar-fallback" class="text-2xl"></span>
                    </div>
                    <div>
                        <h3 id="oracle-name" class="text-lg font-bold text-yellow-400"></h3>
                        <div class="flex items-center gap-2">
                            <span class="text-[8px] text-green-500 special-font">● ESTABLISHED</span>
                            <div class="mic-wave"><span></span><span></span><span></span></div>
                        </div>
                    </div>
                </div>

                <div id="interaction-stage-1" class="flex flex-col gap-2">
                    <p class="text-xs text-yellow-200/70 mb-2 italic">「選擇一個你想探尋的維度...」</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="prepareInput('career', '💼 職業轉折')" class="p-4 bg-yellow-900/20 border border-yellow-900/50 rounded-lg text-xs hover:bg-yellow-900/40 text-left">💼 職業轉折</button>
                        <button onclick="prepareInput('creation', '✍️ 創作靈魂')" class="p-4 bg-yellow-900/20 border border-yellow-900/50 rounded-lg text-xs hover:bg-yellow-900/40 text-left">✍️ 創作靈魂</button>
                        <button onclick="prepareInput('property', '🏠 大地預兆')" class="p-4 bg-yellow-900/20 border border-yellow-900/50 rounded-lg text-xs hover:bg-yellow-900/40 text-left">🏠 大地預兆</button>
                        <button onclick="prepareInput('other', '🌀 跨維自我')" class="p-4 bg-yellow-900/20 border border-yellow-900/50 rounded-lg text-xs hover:bg-yellow-900/40 text-left">🌀 跨維自我</button>
                    </div>
                </div>

                <div id="interaction-stage-2" class="hidden flex-1 flex flex-col gap-4">
                    <div class="flex-1 bg-black/60 border border-yellow-900/30 rounded-xl p-4 flex flex-col items-center text-center overflow-y-auto min-h-[200px]">
                        <div id="mic-status" class="mb-4 shrink-0">
                            <div class="w-12 h-12 bg-red-600/20 rounded-full flex items-center justify-center animate-pulse border border-red-500 mx-auto">
                                <span class="text-xl">🎙️</span>
                            </div>
                            <p class="text-[10px] text-red-500 mt-2 font-bold">正在聆聽...</p>
                        </div>
                        <h4 id="input-prompt-title" class="text-base text-yellow-500 mb-2 shrink-0"></h4>
                        <textarea id="user-input-text" class="w-full bg-transparent border-b border-yellow-900/50 focus:border-yellow-500 outline-none text-center text-sm py-2 resize-none min-h-[80px] placeholder-yellow-900/50" placeholder="（輸入或對著螢幕傾訴...）"></textarea>
                    </div>
                    <div class="pb-4 shrink-0">
                        <button onclick="confirmInput()" class="w-full py-4 bg-yellow-600 text-black font-bold rounded-lg hover:bg-yellow-500 transition-all uppercase tracking-widest shadow-lg">
                            交付命運 (Submit)
                        </button>
                    </div>
                </div>

                <div id="interaction-stage-3" class="hidden flex-1 flex flex-col justify-center items-center text-center">
                    <div class="relative w-20 h-20 mb-6">
                        <div class="absolute inset-0 border-4 border-yellow-500/20 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-t-yellow-500 rounded-full animate-spin"></div>
                        <div class="absolute inset-0 flex items-center justify-center text-2xl">🔮</div>
                    </div>
                    <p id="thinking-status" class="text-yellow-500 animate-pulse text-sm">正在撥開時空的迷霧...</p>
                </div>
            </div>

            <!-- Step 5: Result -->
            <div id="step-5" class="hidden stage-container fade-in">
                <h2 class="text-lg mb-4 font-bold text-yellow-500 text-center">預言摘要已生成</h2>
                <div class="bg-yellow-900/5 border border-yellow-900/40 p-4 rounded-xl mb-4 flex flex-col items-center">
                    <div id="result-art-preview" class="w-full h-40 bg-black/40 rounded-lg mb-4 bg-center bg-cover border border-yellow-900/30 flex items-center justify-center overflow-hidden">
                        <span class="text-[10px] text-yellow-900">IMAGE GENERATED</span>
                    </div>
                    <p id="summary-content" class="italic text-yellow-200 text-xs leading-relaxed text-center"></p>
                </div>
                <button onclick="startPrinting()" class="w-full py-4 bg-yellow-600 text-black font-bold rounded-lg hover:bg-yellow-500 transition-all">印出專屬命運小卡 (PRINT)</button>
            </div>

            <!-- Step 6: Printing -->
            <div id="step-6" class="hidden stage-container text-center fade-in">
                <div id="print-process">
                    <div class="mb-4 special-font text-yellow-500 text-[10px] tracking-widest animate-pulse">PRINTING FATE...</div>
                    <div class="relative w-56 h-[380px] mx-auto bg-white text-black p-3 flex flex-col print-animation shadow-2xl">
                        <div class="border-2 border-black p-1 h-full flex flex-col">
                            <div class="text-[8px] font-black border-b-2 border-black mb-2 text-center tracking-tighter">ZOLTAR PROPHECY CARD</div>
                            <div id="card-art-final" class="w-full aspect-square bg-gray-200 mb-2 bg-center bg-cover border border-black"></div>
                            <div class="flex-1 overflow-hidden">
                               <div class="text-[8px] font-bold uppercase mb-1" id="card-topic-label"></div>
                               <div class="text-[7px] leading-tight text-justify italic" id="card-summary"></div>
                            </div>
                            <div class="mt-1 pt-1 border-t border-dotted border-black flex justify-between items-end">
                                <div class="text-[5px] font-mono text-left">
                                    ID: <span id="card-session-id"></span><br>
                                    DATE: <span id="card-date"></span>
                                </div>
                                <div class="text-[12px]" id="card-oracle-icon"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="print-finished" class="hidden fade-in mt-6 bg-green-900/20 border border-green-500/50 p-4 rounded-xl">
                    <h3 class="text-green-500 font-bold mb-2 text-sm">命運已交付</h3>
                    <button onclick="location.reload()" class="px-8 py-3 border border-yellow-600 text-yellow-500 hover:bg-yellow-500 hover:text-black transition-all font-bold text-xs">
                        回到初始畫面
                    </button>
                </div>
            </div>

        </div>

        <div class="w-full h-8 bg-yellow-900/20 border-t border-yellow-900/30 flex items-center justify-center px-6 text-[7px] text-yellow-800 special-font">
            REAL-TIME FATE ENGINE ACTIVE
        </div>
    </div>

    <script>
        let currentOracle = "";
        let selectedTopic = "";
        let currentResultImage = "";
        const apiKey = ""; 

        const oracleImages = { "祭司": "", "李淳風": "", "Zoltar": "", "先知": "" };
        const oracleEmoji = { "祭司": "🔱", "李淳風": "☯️", "Zoltar": "🔮", "先知": "📡" };

        const oraclePersonas = {
            "祭司": "蘇美爾祭司，口氣古老且神秘。視覺風格：Ancient Mesopotamian, stone textures, warm ember lighting, upper body portrait, centered.",
            "李淳風": "唐代天文學家。視覺風格：Traditional Chinese Ink wash, star maps, upper body portrait, centered composition.",
            "Zoltar": "經典美式占卜機台。視覺風格：Vintage carnival, neon wood grain, upper body portrait, centered.",
            "先知": "未來的 AI 先知。視覺風格：Hyper-futuristic, neural networks, upper body portrait, centered composition."
        };

        async function fetchAIResponse(userText, topic) {
            const persona = oraclePersonas[currentOracle];
            const systemPrompt = `你現在扮演${persona}。使用者尋求「${topic}」指引。使用者說：「${userText || '...'}」。請給予一段預言（100字內）。`;

            let retries = 5;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `使用者輸入：${userText || '（沈默）'}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "時空連結失敗。";
                } catch (err) {
                    await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
                }
            }
        }

        async function fetchImageWithRetry(prompt, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } })
                    });
                    
                    if (response.status === 429) {
                        // 如果遇到頻率限制，等待更久一點
                        await new Promise(r => setTimeout(r, 2000 * (i + 1)));
                        continue;
                    }

                    const result = await response.json();
                    if (result.predictions?.[0]?.bytesBase64Encoded) {
                        return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    }
                } catch (err) {
                    await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
                }
            }
            return "";
        }

        // 串行生成頭像，避免 API 頻率限制
        async function generatePortraitsSequential() {
            const configs = [
                { key: "Zoltar", id: "zoltar", prompt: "Upper body portrait of Zoltar machine, centered, vintage carnival style" },
                { key: "祭司", id: "priest", prompt: "Upper body portrait of an ancient Mesopotamian priest, stone textures" },
                { key: "李淳風", id: "li", prompt: "Upper body portrait of Li Chunfeng Chinese master, ink wash style" },
                { key: "先知", id: "oracle", prompt: "Upper body portrait of a futuristic neural AI oracle, neon circuitry" }
            ];

            for (const item of configs) {
                document.getElementById('load-status').innerText = `正在喚醒 ${item.key}...`;
                const imgData = await fetchImageWithRetry(item.prompt);
                
                const btn = document.getElementById(`btn-${item.id}`);
                const loading = document.getElementById(`loading-${item.id}`);
                const imgDiv = document.getElementById(`img-${item.id}`);

                if (imgData) {
                    oracleImages[item.key] = imgData;
                    imgDiv.style.backgroundImage = `url(${imgData})`;
                    imgDiv.innerText = ""; // 移除 Emoji
                } else {
                    // 如果 API 失敗，使用 Emoji 並直接啟用按鈕，不讓使用者卡住
                    console.log(`Failed to load image for ${item.key}, using fallback.`);
                }
                
                loading.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('oracle-card-disabled');

                // 每個請求之間間隔 1.5 秒，降低 429 機率
                await new Promise(r => setTimeout(r, 1500));
            }
            document.getElementById('load-status').innerText = "星際導師已就位。";
        }

        function nextStep(n) {
            document.querySelectorAll('#main-frame > div > div[id^="step-"], #main-frame > div > .stage-container').forEach(d => d.classList.add('hidden'));
            document.getElementById(`step-${n}`).classList.remove('hidden');
            if (n === 2) typeEffect('hook-text', "能量匯聚中... 請在四維時空中選擇您的導師。");
            if (n === 4) {
                const avatarImg = document.getElementById('oracle-avatar-img');
                const avatarFallback = document.getElementById('oracle-avatar-fallback');
                
                if (oracleImages[currentOracle]) {
                    avatarImg.src = oracleImages[currentOracle];
                    avatarImg.classList.remove('hidden');
                    avatarFallback.classList.add('hidden');
                } else {
                    avatarImg.classList.add('hidden');
                    avatarFallback.innerText = oracleEmoji[currentOracle];
                    avatarFallback.classList.remove('hidden');
                }
                
                document.getElementById('oracle-name').innerText = currentOracle;
                document.getElementById('interaction-stage-1').classList.remove('hidden');
                document.getElementById('interaction-stage-2').classList.add('hidden');
                document.getElementById('interaction-stage-3').classList.add('hidden');
            }
        }

        function selectOracle(type) { currentOracle = type; nextStep(3); }

        function prepareInput(topic, topicLabel) {
            selectedTopic = topicLabel;
            document.getElementById('interaction-stage-1').classList.add('hidden');
            document.getElementById('interaction-stage-2').classList.remove('hidden');
            document.getElementById('input-prompt-title').innerText = topicLabel;
            document.getElementById('user-input-text').value = "";
        }

        async function confirmInput() {
            const userText = document.getElementById('user-input-text').value;
            document.getElementById('interaction-stage-2').classList.add('hidden');
            document.getElementById('interaction-stage-3').classList.remove('hidden');
            
            const aiReply = await fetchAIResponse(userText, selectedTopic);
            const personaStyle = oraclePersonas[currentOracle].split('：')[1] || "Artistic illustration";
            const artPrompt = `Symbolic visual concept art about ${selectedTopic}. Style: ${personaStyle}. STRICT NEGATIVE: NO TEXT, NO LETTERS, NO WORDS, NO NUMBERS. Only pure artwork.`;
            
            const resultImg = await fetchImageWithRetry(artPrompt);
            currentResultImage = resultImg;

            document.getElementById('summary-content').innerText = aiReply;
            if (resultImg) {
                document.getElementById('result-art-preview').style.backgroundImage = `url(${resultImg})`;
                document.getElementById('result-art-preview').innerHTML = "";
            } else {
                document.getElementById('result-art-preview').innerHTML = `<span class="text-4xl">${oracleEmoji[currentOracle]}</span>`;
            }
            
            document.getElementById('card-summary').innerText = aiReply;
            document.getElementById('card-topic-label').innerText = selectedTopic;
            
            setTimeout(() => nextStep(5), 500);
        }

        function startPrinting() {
            nextStep(6);
            document.getElementById('card-oracle-icon').innerText = oracleEmoji[currentOracle];
            if (currentResultImage) {
                document.getElementById('card-art-final').style.backgroundImage = `url(${currentResultImage})`;
            }
            document.getElementById('card-session-id').innerText = Math.random().toString(16).substring(2, 8).toUpperCase();
            document.getElementById('card-date').innerText = new Date().toLocaleDateString();

            setTimeout(() => {
                document.getElementById('print-finished').classList.remove('hidden');
                document.getElementById('print-process').classList.add('opacity-40');
            }, 3000);
        }

        function typeEffect(id, text) {
            const el = document.getElementById(id);
            el.innerText = "";
            let i = 0;
            const timer = setInterval(() => {
                el.innerText += text[i];
                if (++i >= text.length) clearInterval(timer);
            }, 40);
        }

        window.onload = generatePortraitsSequential;
    </script>
</body>
